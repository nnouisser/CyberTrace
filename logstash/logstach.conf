input {
  file {
    path           => "C:/elk/zeek_output/*.log"
    start_position => "beginning"
    sincedb_path   => "C:/elk/zeek_output/.sincedb_logstash"
    codec          => "json"
  }
}

filter {
  mutate {
    add_field => { "log_type" => "%{[@metadata][path]}" }
  }

  mutate {
    gsub => [
      "log_type", "^.*[/\\\\]", "",
      "log_type", "\.log$",     ""
    ]
  }

  if [ts] {
    date {
      match  => ["ts", "UNIX"]
      target => "@timestamp"
    }
  }

  ruby {
    code => '
      event.to_hash.each do |key, value|
        if value == "-" || value == "" || value == "(empty)"
          event.remove(key)
        end
        if value.is_a?(Array) && (value == ["-"] || value.empty?)
          event.remove(key)
        end
      end
    '
  }

  if [log_type] == "conn" {
    mutate {
      convert => {
        "duration"       => "float"
        "orig_bytes"     => "integer"
        "resp_bytes"     => "integer"
        "orig_pkts"      => "integer"
        "resp_pkts"      => "integer"
        "orig_ip_bytes"  => "integer"
        "resp_ip_bytes"  => "integer"
        "missed_bytes"   => "integer"
        "id.orig_p"      => "integer"
        "id.resp_p"      => "integer"
      }
    }
  }

  if [log_type] == "dns" {
    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
        "rcode"     => "integer"
        "qclass"    => "integer"
        "qtype"     => "integer"
        "Z"         => "integer"
      }
    }
  }

  mutate {
    remove_field => ["host", "log", "message", "@version", "[host]", "[log]"]
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "zeek-%{log_type}-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}